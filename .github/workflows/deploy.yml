name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://app.wezume.in/api

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 89.116.134.110 >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            root@89.116.134.110:/home/wezume-com/htdocs/wezume.com/frontend/
